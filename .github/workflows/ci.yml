name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: energy_etl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: pip install -e ".[dev]"

      - name: Validate Dagster definitions load
        run: python -c "from energy_etl.definitions import defs; print('definitions OK')"

      - name: Run tests
        run: python -m pytest energy_etl_tests/ -v
